<!-- @dsCard group="Colors" viewport="700x150" name="Paper" subtitle="Warm drafting-paper surfaces" -->
<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;padding:20px;background:var(--surface-page);display:flex;gap:16px;">
  <div style="flex:1;">
    <div style="height:64px;background:var(--paper-1);border:1px solid var(--line-construction);"></div>
    <p style="margin:8px 0 0;font-size:11px;text-transform:uppercase;">--paper-1 · sheet</p>
    <p style="margin:2px 0 0;font-size:11px;color:var(--text-annotation);">#EFEDE7</p>
  </div>
  <div style="flex:1;">
    <div style="height:64px;background:var(--paper-2);border:1px solid var(--line-construction);"></div>
    <p style="margin:8px 0 0;font-size:11px;text-transform:uppercase;">--paper-2 · desk</p>
    <p style="margin:2px 0 0;font-size:11px;color:var(--text-annotation);">#E7E4DC</p>
  </div>
  <div style="flex:1;">
    <div style="height:64px;background:var(--paper-3);border:1px solid var(--line-construction);"></div>
    <p style="margin:8px 0 0;font-size:11px;text-transform:uppercase;">--paper-3 · cell</p>
    <p style="margin:2px 0 0;font-size:11px;color:var(--text-annotation);">#F4F2EE</p>
  </div>
</body>
</html>
