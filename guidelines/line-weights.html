<!-- @dsCard group="Lines" viewport="700x210" name="Line Weights" subtitle="Hairlines everywhere; one heavy weight for the subject" -->
<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;padding:24px;background:var(--surface-sheet);display:flex;flex-direction:column;gap:18px;">
  <div style="display:flex;align-items:center;gap:20px;">
    <div style="width:220px;border-top:1px solid var(--line-standard);"></div>
    <p style="margin:0;font-size:11px;text-transform:uppercase;">--line-w-hair 1px · dimensions, borders, leaders</p>
  </div>
  <div style="display:flex;align-items:center;gap:20px;">
    <div style="width:220px;border-top:2.5px solid var(--line-subject);"></div>
    <p style="margin:0;font-size:11px;text-transform:uppercase;">--line-w-subject 2.5px · the subject only</p>
  </div>
  <div style="display:flex;align-items:center;gap:20px;">
    <div style="width:220px;border-top:1px dashed var(--line-construction);"></div>
    <p style="margin:0;font-size:11px;text-transform:uppercase;">construction · dashed, graphite-4</p>
  </div>
  <div style="display:flex;align-items:center;gap:20px;">
    <svg width="220" height="2"><line x1="0" y1="1" x2="220" y2="1" stroke="var(--line-construction)" stroke-width="1" stroke-dasharray="14 4 3 4"></line></svg>
    <p style="margin:0;font-size:11px;text-transform:uppercase;">center line · --dash-center</p>
  </div>
  <p style="margin:0;font-size:11px;color:var(--text-annotation);text-transform:uppercase;">Radius: 0 on everything. All corners and edges to be sharp.</p>
</body>
</html>
