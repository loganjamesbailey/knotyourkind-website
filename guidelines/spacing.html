<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing Scale" subtitle="8px grid with a 4px half-step" -->
<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;padding:24px;background:var(--surface-sheet);">
  <div style="display:flex;align-items:flex-end;gap:20px;">
    <div><div style="width:4px;height:4px;background:var(--graphite-3);"></div><p style="margin:6px 0 0;font-size:10px;text-transform:uppercase;">1·4</p></div>
    <div><div style="width:8px;height:8px;background:var(--graphite-3);"></div><p style="margin:6px 0 0;font-size:10px;text-transform:uppercase;">2·8</p></div>
    <div><div style="width:16px;height:16px;background:var(--graphite-3);"></div><p style="margin:6px 0 0;font-size:10px;text-transform:uppercase;">3·16</p></div>
    <div><div style="width:24px;height:24px;background:var(--graphite-3);"></div><p style="margin:6px 0 0;font-size:10px;text-transform:uppercase;">4·24</p></div>
    <div><div style="width:32px;height:32px;background:var(--graphite-3);"></div><p style="margin:6px 0 0;font-size:10px;text-transform:uppercase;">5·32</p></div>
    <div><div style="width:48px;height:48px;background:var(--graphite-3);"></div><p style="margin:6px 0 0;font-size:10px;text-transform:uppercase;">6·48</p></div>
    <div><div style="width:64px;height:64px;background:var(--graphite-3);"></div><p style="margin:6px 0 0;font-size:10px;text-transform:uppercase;">7·64</p></div>
    <div><div style="width:96px;height:96px;background:var(--graphite-3);"></div><p style="margin:6px 0 0;font-size:10px;text-transform:uppercase;">8·96</p></div>
  </div>
</body>
</html>
