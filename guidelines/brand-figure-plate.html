<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;padding:24px;background:var(--surface-sheet);display:flex;gap:28px;align-items:flex-start;">
  <figure style="margin:0;">
    <div style="border:1px solid var(--line-standard);padding:6px;background:var(--surface-cell);">
      <img src="../assets/member_8.png" alt="Member #8" style="width:190px;display:block;filter:grayscale(1) contrast(0.95);">
    </div>
    <figcaption style="margin-top:8px;font-size:11px;text-transform:uppercase;text-align:center;">Fig. 8 — Part #8, sole remaining member.</figcaption>
  </figure>
  <p style="margin:0;font-size:11px;color:var(--text-annotation);text-transform:uppercase;line-height:1.7;max-width:220px;">Grayscale. Hairline frame. Caption outside the plate. No overlays, no gradients. Parts #0–#7 removed per ECO-009; for the exploded (deconstructed) treatment see the website kit.</p>
</body>
</html>
