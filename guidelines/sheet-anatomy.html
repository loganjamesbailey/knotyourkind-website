<!-- @dsCard group="Spacing" viewport="700x240" name="Sheet Anatomy" subtitle="Paper tooth, double-ruled frame, title block anchor" -->
<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;padding:20px;background:var(--surface-page);">
  <div class="kyk-paper" style="padding:14px;">
    <div class="kyk-sheet-frame" style="position:relative;z-index:1;padding:16px;min-height:150px;display:flex;flex-direction:column;justify-content:space-between;">
      <p style="margin:0;font-size:11px;color:var(--text-annotation);text-transform:uppercase;">Sheet margin 24 · border gap 4 · tooth 5%</p>
      <div style="display:flex;justify-content:flex-end;">
        <div style="border:1px solid var(--line-standard);background:var(--surface-cell);font-size:10px;text-transform:uppercase;display:grid;grid-template-columns:auto auto auto;">
          <span style="padding:6px 12px;border-right:1px solid var(--line-standard);">Title: Sheet Anatomy</span>
          <span style="padding:6px 12px;border-right:1px solid var(--line-standard);">Scale: 1:1</span>
          <span style="padding:6px 12px;">Sheet 1 of 9</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
