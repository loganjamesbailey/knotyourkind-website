<!-- @dsCard group="Colors" viewport="700x140" name="Stamp Red" subtitle="The only accent — inspection stamps exclusively" -->
<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;padding:20px;background:var(--surface-sheet);display:flex;gap:24px;align-items:center;">
  <div style="width:180px;">
    <div style="height:52px;background:var(--stamp-red);"></div>
    <p style="margin:8px 0 0;font-size:11px;text-transform:uppercase;">--stamp-red</p>
    <p style="margin:2px 0 0;font-size:11px;color:var(--text-annotation);">#9E3B30</p>
  </div>
  <span style="display:inline-block;transform:rotate(-8deg);border:2px solid var(--stamp-red-faded);color:var(--stamp-red-faded);padding:6px 16px;font-size:14px;letter-spacing:0.18em;text-transform:uppercase;">Status: Under Construction</span>
  <p style="flex:1;margin:0;font-size:11px;color:var(--text-annotation);text-transform:uppercase;line-height:1.6;">Never for UI chrome, links, or emphasis. Stamps only.</p>
</body>
</html>
