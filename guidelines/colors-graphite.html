<!-- @dsCard group="Colors" viewport="700x150" name="Graphite" subtitle="4-step graphite line + text scale" -->
<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;padding:20px;background:var(--surface-sheet);display:flex;gap:16px;">
  <div style="flex:1;">
    <div style="height:64px;background:var(--graphite-1);"></div>
    <p style="margin:8px 0 0;font-size:11px;text-transform:uppercase;">--graphite-1 · subject</p>
    <p style="margin:2px 0 0;font-size:11px;color:var(--text-annotation);">#2C2B28</p>
  </div>
  <div style="flex:1;">
    <div style="height:64px;background:var(--graphite-2);"></div>
    <p style="margin:8px 0 0;font-size:11px;text-transform:uppercase;">--graphite-2 · standard</p>
    <p style="margin:2px 0 0;font-size:11px;color:var(--text-annotation);">#45433F</p>
  </div>
  <div style="flex:1;">
    <div style="height:64px;background:var(--graphite-3);"></div>
    <p style="margin:8px 0 0;font-size:11px;text-transform:uppercase;">--graphite-3 · light</p>
    <p style="margin:2px 0 0;font-size:11px;color:var(--text-annotation);">#77746D</p>
  </div>
  <div style="flex:1;">
    <div style="height:64px;background:var(--graphite-4);"></div>
    <p style="margin:8px 0 0;font-size:11px;text-transform:uppercase;">--graphite-4 · construction</p>
    <p style="margin:2px 0 0;font-size:11px;color:var(--text-annotation);">#A8A49B</p>
  </div>
</body>
</html>
